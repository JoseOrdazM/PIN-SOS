# fly.toml app configuration for PIN-SOS
app = "pin-sos"

primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "pinsos_data"
  destination = "/data"

[env]
  PORT = "8080"
  DB_PATH = "/data/pinsos.db"
  UPLOADS_DIR = "/data/uploads"
  STATIC_DIR = "/app/static"

[deploy]
  release_command = "echo 'PIN-SOS v2 deployed'"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    type = "connections"
    hard_limit = 100
    soft_limit = 50
